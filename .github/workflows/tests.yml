name: Tests

on:
  push:
    branches: [master, "claude/**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r app/requirements-dev.txt
      - name: Ejecutar tests
        run: python -m pytest
        working-directory: app
